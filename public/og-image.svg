<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Dark indigo/navy gradient background -->
  <defs>
    <linearGradient id="gradientBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#gradientBg)" />

  <!-- Decorative elements: subtle grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="0" />
    <line x1="0" y1="50" x2="1200" y2="50" />
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="250" x2="1200" y2="250" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="350" x2="1200" y2="350" />
    <line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="450" x2="1200" y2="450" />
    <line x1="0" y1="500" x2="1200" y2="500" />
    <line x1="0" y1="550" x2="1200" y2="550" />
    <line x1="0" y1="600" x2="1200" y2="600" />
  </g>

  <!-- Accent shapes: shield outline -->
  <g opacity="0.08" fill="none" stroke="#818cf8" stroke-width="2">
    <path d="M 150 100 L 250 150 L 250 350 L 150 420 L 50 350 L 50 150 Z" />
  </g>

  <!-- Main text: Intellios -->
  <text
    x="600"
    y="220"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="96"
    font-weight="700"
    text-anchor="middle"
    fill="white"
    letter-spacing="-2"
  >
    Intellios
  </text>

  <!-- Subtitle -->
  <text
    x="600"
    y="320"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="36"
    font-weight="500"
    text-anchor="middle"
    fill="#e2e8f0"
    letter-spacing="0.5"
  >
    The Governed Control Plane
  </text>

  <text
    x="600"
    y="365"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="36"
    font-weight="500"
    text-anchor="middle"
    fill="#e2e8f0"
    letter-spacing="0.5"
  >
    for Enterprise AI Agents
  </text>

  <!-- Accent line -->
  <line x1="300" y1="420" x2="900" y2="420" stroke="url(#textGradient)" stroke-width="3" opacity="0.6" />

  <!-- Decorative nodes in bottom corner -->
  <g opacity="0.15" fill="#818cf8">
    <circle cx="100" cy="550" r="4" />
    <circle cx="180" cy="520" r="3" />
    <circle cx="150" cy="590" r="3" />
    <circle cx="1080" cy="100" r="4" />
    <circle cx="1150" cy="150" r="3" />
    <circle cx="1100" cy="180" r="3" />
  </g>

  <!-- Connection lines -->
  <g opacity="0.1" stroke="#818cf8" stroke-width="1">
    <line x1="100" y1="550" x2="180" y2="520" />
    <line x1="100" y1="550" x2="150" y2="590" />
    <line x1="1080" y1="100" x2="1150" y2="150" />
    <line x1="1080" y1="100" x2="1100" y2="180" />
  </g>
</svg>
