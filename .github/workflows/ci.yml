name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ─── Typecheck ────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  # ─── Lint ─────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci
      - run: npx next lint --dir .

  # ─── Unit Tests ───────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci
      - run: npm test

  # ─── Build ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    defaults:
      run:
        working-directory: src
    env:
      # Stub required env vars for build (not used at runtime)
      DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      AUTH_SECRET: ci-build-stub-secret-not-for-production
      ANTHROPIC_API_KEY: sk-ant-stub-not-real
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci
      - run: npm run build

  # ─── Security Audit ──────────────────────────────────────────────────
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/package-lock.json

      - run: npm ci
      # Audit production deps only; fail on high/critical
      - run: npm audit --omit=dev --audit-level=high
        continue-on-error: true  # Advisory initially — switch to hard fail once CVEs cleared

  # ─── E2E Tests (runs against staging/preview) ─────────────────────────
